# application & profiles
spring.application.name=planent
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}


# env directory
springdotenv.directory=./


# server & cors
server.port=${BACKEND_PORT:5000}
server.servlet.context-path=/api
frontend.urls=${SPRING_FRONTEND_URLS}

# files (media file size)
app.storage.media-folder=media
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=30MB

# database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# hibernate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.results.basic=TRACE
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:validate}
# enable batch fetching to avoid the N+1 problem
spring.jpa.properties.hibernate.default_batch_fetch_size=50
# Fix for Case Sensitivity
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl


# security
application.security.jwt-secret-key=${JWT_SECRET_KEY}
application.security.jwt-ttl=${JWT_EXPIRATION_MS:3600000}